name: SIL Tests & Pico Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "firmware/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "firmware/**"
      - ".github/workflows/**"
    

jobs:
  sil-tests:
    name: Run STM Checks (Native)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Complie for STM Nucleo
	run: |
	  pio run -e nucleo_f411re

      - name: Quality Check STM
        run: |
          pio check -e nucleo
 
  build-stm:
    name: Build STM Firmware
    runs-on: ubuntu-latest
    needs: sil-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build STM firmware
        run: |
          pio run -e nucelo_f411re

      - name: Upload STM firmware
        uses: actions/upload-artifact@v4
        with:
          name: stm-firmware
          path: |
            .pio/build/pico/nucleo_f411re
